# CodeMagic workflow for Y WONDER GREEN FARM.
# Signing secrets must be configured in CodeMagic, not committed to git.

workflows:
  unity-ios-release:
    name: Unity iOS Release (Unity export + IPA)
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      unity: 6000.3.15f1
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.ywonder.greenfarm
      groups:
        - unity_credentials
      vars:
        UNITY_IOS_DIR: ios
        XCODE_PROJECT: Unity-iPhone.xcodeproj
        XCODE_SCHEME: Unity-iPhone
        BUNDLE_ID: com.ywonder.greenfarm
        APP_VERSION: 0.1.1
        BUILD_NUMBER: 4

    scripts:
      - name: Fetch Git LFS assets
        script: |
          git lfs pull

      - name: Activate Unity license
        script: |
          $UNITY_HOME/Contents/MacOS/Unity -batchmode -quit -logFile - \
            -serial ${UNITY_SERIAL} \
            -username ${UNITY_EMAIL} \
            -password ${UNITY_PASSWORD}

      - name: Generate Xcode project from Unity
        script: |
          $UNITY_HOME/Contents/MacOS/Unity -batchmode \
            -quit \
            -logFile - \
            -projectPath . \
            -buildTarget iOS \
            -executeMethod YWonderLand.CI.BuildScript.BuildIos \
            -nographics

      - name: Force iOS version, build number, and export compliance
        script: |
          PROJECT_FILE="$UNITY_IOS_DIR/$XCODE_PROJECT/project.pbxproj"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $APP_VERSION" "$UNITY_IOS_DIR/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "$UNITY_IOS_DIR/Info.plist"
          /usr/libexec/PlistBuddy -c "Delete :ITSAppUsesNonExemptEncryption" "$UNITY_IOS_DIR/Info.plist" || true
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$UNITY_IOS_DIR/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $APP_VERSION" "$UNITY_IOS_DIR/UnityFramework/Info.plist" || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "$UNITY_IOS_DIR/UnityFramework/Info.plist" || true
          perl -0pi -e "s/CURRENT_PROJECT_VERSION = [^;]+;/CURRENT_PROJECT_VERSION = ${BUILD_NUMBER};/g" "$PROJECT_FILE"
          /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$UNITY_IOS_DIR/Info.plist"
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$UNITY_IOS_DIR/Info.plist"
          /usr/libexec/PlistBuddy -c "Print :ITSAppUsesNonExemptEncryption" "$UNITY_IOS_DIR/Info.plist"

      - name: Prepare iOS executable scripts
        script: |
          chmod +x "$UNITY_IOS_DIR/process_symbols.sh" "$UNITY_IOS_DIR/usymtool" "$UNITY_IOS_DIR/usymtoolarm64"
          ls -lh "$UNITY_IOS_DIR/process_symbols.sh" "$UNITY_IOS_DIR/usymtool" "$UNITY_IOS_DIR/usymtoolarm64"

      - name: Set up iOS code signing
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$UNITY_IOS_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

      - name: Verify IPA version before publish
        script: |
          set -e
          IPA_PATH=$(ls build/ios/ipa/*.ipa | head -n 1)
          TMP_DIR=$(mktemp -d)
          unzip -q "$IPA_PATH" -d "$TMP_DIR"
          APP_PLIST=$(find "$TMP_DIR/Payload" -maxdepth 2 -name Info.plist -path "*.app/Info.plist" -print -quit)
          IPA_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$APP_PLIST")
          IPA_BUILD=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$APP_PLIST")
          echo "Built IPA version: $IPA_VERSION ($IPA_BUILD)"
          if [ "$IPA_VERSION" != "$APP_VERSION" ] || [ "$IPA_BUILD" != "$BUILD_NUMBER" ]; then
            echo "IPA version mismatch. Expected $APP_VERSION ($BUILD_NUMBER), got $IPA_VERSION ($IPA_BUILD)."
            exit 1
          fi

    artifacts:
      - build/ios/ipa/*.ipa
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
      - $HOME/Library/Developer/Xcode/DerivedData/**/Logs/**/*.xcactivitylog

    publishing:
      scripts:
        - name: Deactivate Unity license
          script: |
            $UNITY_HOME/Contents/MacOS/Unity -batchmode -quit -logFile - -returnlicense -username ${UNITY_EMAIL} -password ${UNITY_PASSWORD}

  ios-testflight-from-exported-xcode:
    name: iOS TestFlight (exported Xcode project, no Unity)
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.ywonder.greenfarm
      groups:
        - appstore_credentials
      vars:
        UNITY_IOS_DIR: ios
        XCODE_PROJECT: Unity-iPhone.xcodeproj
        XCODE_SCHEME: Unity-iPhone
        APP_VERSION: 0.1.1
        BUILD_NUMBER: 4

    scripts:
      - name: Fetch Git LFS assets
        script: |
          git lfs pull

      - name: Verify exported Unity Xcode project
        script: |
          if [ ! -d "$UNITY_IOS_DIR/$XCODE_PROJECT" ]; then
            echo "Missing exported Unity Xcode project: $UNITY_IOS_DIR/$XCODE_PROJECT"
            echo "This workflow intentionally does not run Unity."
            echo "Export iOS from Unity locally, then commit/push the generated ios/ folder, or use the unity-ios-release workflow."
            exit 1
          fi

      - name: Prepare iOS executable scripts
        script: |
          chmod +x "$UNITY_IOS_DIR/process_symbols.sh" "$UNITY_IOS_DIR/usymtool" "$UNITY_IOS_DIR/usymtoolarm64"
          ls -lh "$UNITY_IOS_DIR/process_symbols.sh" "$UNITY_IOS_DIR/usymtool" "$UNITY_IOS_DIR/usymtoolarm64"

      - name: Force iOS bundle identifier
        script: |
          PROJECT_FILE="$UNITY_IOS_DIR/$XCODE_PROJECT/project.pbxproj"
          perl -0pi -e 's/com\.Unity-Technologies\.com\.unity\.template\.urp-blank/com.ywonder.greenfarm/g' "$PROJECT_FILE"
          grep -n "PRODUCT_BUNDLE_IDENTIFIER" "$PROJECT_FILE"

      - name: Force iOS version, build number, and export compliance
        script: |
          PROJECT_FILE="$UNITY_IOS_DIR/$XCODE_PROJECT/project.pbxproj"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $APP_VERSION" "$UNITY_IOS_DIR/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "$UNITY_IOS_DIR/Info.plist"
          /usr/libexec/PlistBuddy -c "Delete :ITSAppUsesNonExemptEncryption" "$UNITY_IOS_DIR/Info.plist" || true
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$UNITY_IOS_DIR/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $APP_VERSION" "$UNITY_IOS_DIR/UnityFramework/Info.plist" || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "$UNITY_IOS_DIR/UnityFramework/Info.plist" || true
          perl -0pi -e "s/CURRENT_PROJECT_VERSION = [^;]+;/CURRENT_PROJECT_VERSION = ${BUILD_NUMBER};/g" "$PROJECT_FILE"
          /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$UNITY_IOS_DIR/Info.plist"
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$UNITY_IOS_DIR/Info.plist"
          /usr/libexec/PlistBuddy -c "Print :ITSAppUsesNonExemptEncryption" "$UNITY_IOS_DIR/Info.plist"

      - name: Verify IL2CPP linker flags
        script: |
          PROJECT_FILE="$UNITY_IOS_DIR/$XCODE_PROJECT/project.pbxproj"
          grep -n '\$CONFIGURATION_BUILD_DIR/il2cpp\.a' "$PROJECT_FILE"
          grep -n "libGameAssembly.a" "$PROJECT_FILE"

      - name: Set up iOS code signing
        script: |
          xcode-project use-profiles

      - name: Diagnose GameAssembly build
        script: |
          set -o pipefail
          PROJECT_PATH="$UNITY_IOS_DIR/$XCODE_PROJECT"
          mkdir -p build/diagnostics
          echo "Inspecting GameAssembly build settings"
          xcodebuild \
            -project "$PROJECT_PATH" \
            -target GameAssembly \
            -configuration Release \
            -sdk iphoneos \
            -showBuildSettings \
            | grep -E "TARGET_NAME|PRODUCT_NAME|CONFIGURATION_BUILD_DIR|TARGET_BUILD_DIR|ARCHS|SDKROOT|ONLY_ACTIVE_ARCH|SYMROOT|OBJROOT" \
            || true
          echo "Building GameAssembly target before IPA archive"
          xcodebuild \
            -project "$PROJECT_PATH" \
            -target GameAssembly \
            -configuration Release \
            -sdk iphoneos \
            build \
            | tee build/diagnostics/gameassembly-xcodebuild.log
          echo "Searching for generated IL2CPP static libraries"
          find "$HOME/Library/Developer/Xcode/DerivedData" "$PWD/$UNITY_IOS_DIR" \
            \( -name "libGameAssembly.a" -o -name "il2cpp.a" \) \
            -print \
            -exec ls -lh {} \; \
            | tee build/diagnostics/gameassembly-artifacts.log
          if ! find "$HOME/Library/Developer/Xcode/DerivedData" "$PWD/$UNITY_IOS_DIR" -name "libGameAssembly.a" -print -quit | grep -q .; then
            echo "libGameAssembly.a was not generated before Build IPA"
            exit 1
          fi
          if ! find "$HOME/Library/Developer/Xcode/DerivedData" "$PWD/$UNITY_IOS_DIR" -name "il2cpp.a" -print -quit | grep -q .; then
            echo "il2cpp.a was not generated before Build IPA"
            exit 1
          fi

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$UNITY_IOS_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

      - name: Verify IPA version before publish
        script: |
          set -e
          IPA_PATH=$(ls build/ios/ipa/*.ipa | head -n 1)
          TMP_DIR=$(mktemp -d)
          unzip -q "$IPA_PATH" -d "$TMP_DIR"
          APP_PLIST=$(find "$TMP_DIR/Payload" -maxdepth 2 -name Info.plist -path "*.app/Info.plist" -print -quit)
          IPA_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$APP_PLIST")
          IPA_BUILD=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$APP_PLIST")
          echo "Built IPA version: $IPA_VERSION ($IPA_BUILD)"
          if [ "$IPA_VERSION" != "$APP_VERSION" ] || [ "$IPA_BUILD" != "$BUILD_NUMBER" ]; then
            echo "IPA version mismatch. Expected $APP_VERSION ($BUILD_NUMBER), got $IPA_VERSION ($IPA_BUILD)."
            exit 1
          fi

    artifacts:
      - build/ios/ipa/*.ipa
      - build/diagnostics/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
      - $HOME/Library/Developer/Xcode/DerivedData/**/Logs/**/*.xcactivitylog

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
